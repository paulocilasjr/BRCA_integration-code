name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install package and test dependencies
        run: python -m pip install -e '.[test]'
      - name: Verify deposited input checksums
        run: sha256sum --check checksums.sha256
      - name: Compile and test
        run: |
          python -m compileall -q main.py scripts src tests
          pytest
